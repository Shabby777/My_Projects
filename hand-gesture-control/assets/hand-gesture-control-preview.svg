  <text x="116" y="150" fill="#EEF5FF" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">Browser Hand Gesture Control</text>
  <text x="116" y="194" fill="#9BB1CE" font-family="Inter, Arial, sans-serif" font-size="24">Use an open hand to move the virtual cursor and pinch to click on UI targets.</text>
